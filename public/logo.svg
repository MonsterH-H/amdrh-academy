<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none">
  <!-- Handball circle background -->
  <circle cx="28" cy="28" r="25" fill="#1D4ED8"/>

  <!-- Handball panel stitching — vertical S-curve -->
  <path d="M28 3 C21 13, 21 43, 28 53" stroke="#ffffff" stroke-width="1" opacity="0.25" fill="none"/>
  <!-- Handball panel stitching — horizontal S-curve -->
  <path d="M3 28 C13 21, 43 21, 53 28" stroke="#ffffff" stroke-width="1" opacity="0.25" fill="none"/>
  <!-- Second vertical stitch line -->
  <path d="M28 3 C35 13, 35 43, 28 53" stroke="#ffffff" stroke-width="1" opacity="0.25" fill="none"/>
  <!-- Second horizontal stitch line -->
  <path d="M3 28 C13 35, 43 35, 53 28" stroke="#ffffff" stroke-width="1" opacity="0.25" fill="none"/>

  <!-- Gold accent ring -->
  <circle cx="28" cy="28" r="25" stroke="#F59E0B" stroke-width="2.2" fill="none"/>

  <!-- Letter A — geometric Swiss style -->
  <path d="M18 41 L28 14 L38 41" stroke="#F59E0B" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M21 34 L35 34" stroke="#F59E0B" stroke-width="2.4" stroke-linecap="round" fill="none"/>

  <!-- Separator line -->
  <line x1="62" y1="13" x2="62" y2="43" stroke="#E2E8F0" stroke-width="1.2"/>

  <!-- Académie text -->
  <text x="74" y="29" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="700" font-size="18.5" fill="#1D4ED8" letter-spacing="-0.3">Académie</text>

  <!-- AMDRH text -->
  <text x="74" y="46" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="700" font-size="11" fill="#64748B" letter-spacing="4.5">AMDRH</text>
</svg>
